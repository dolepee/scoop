name: Scoop Cycle

# The agent's heartbeat. Observe mode (SCOOP_PAID only) until a manual
# dispatch or repository variable arms SCOOP_TRADE; live mode runs hourly. Every run
# pays for its own data from the agent wallet and commits a chained receipt,
# so the git history timestamps each decision before the market grades it.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      trade:
        description: "Arm real trading for this run (1 = execute)"
        default: "0"
      force:
        description: "Bypass freshness guard (1 = run even if a recent receipt exists)"
        default: "0"
      stable_compliance:
        description: "Run stable-to-stable daily gate repair instead of strategy cycle (1 = yes)"
        default: "0"
      stable_from:
        description: "Stable input symbol for daily gate repair"
        default: "USDT"
      stable_to:
        description: "Stable output symbol for daily gate repair"
        default: "USDC"
      stable_amount:
        description: "Stable amount for daily gate repair, max 10"
        default: "5"
      close_position:
        description: "Close current recorded position to USDT (1 = yes)"
        default: "0"

permissions:
  contents: write

concurrency:
  group: scoop-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    env:
      TWAK_ACCESS_ID: ${{ secrets.TWAK_ACCESS_ID }}
      TWAK_HMAC_SECRET: ${{ secrets.TWAK_HMAC_SECRET }}
      TWAK_WALLET_PASSWORD: ${{ secrets.TWAK_WALLET_PASSWORD }}
      BANKR_LLM_KEY: ${{ secrets.BANKR_LLM_KEY }}
      SCOOP_PAID: "1"
      SCOOP_TRADE: ${{ github.event_name == 'workflow_dispatch' && inputs.trade || vars.SCOOP_TRADE_LIVE || '0' }}
      SCOOP_FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force || '0' }}
      SCOOP_STABLE_COMPLIANCE: ${{ github.event_name == 'workflow_dispatch' && inputs.stable_compliance || '0' }}
      SCOOP_STABLE_FROM: ${{ github.event_name == 'workflow_dispatch' && inputs.stable_from || 'USDT' }}
      SCOOP_STABLE_TO: ${{ github.event_name == 'workflow_dispatch' && inputs.stable_to || 'USDC' }}
      SCOOP_STABLE_AMOUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.stable_amount || '5' }}
      SCOOP_CLOSE_POSITION: ${{ github.event_name == 'workflow_dispatch' && inputs.close_position || '0' }}
      SCOOP_DATA_CAP_USD: "0.05"
      SCOOP_MIN_RUN_INTERVAL_MINUTES: "50"
      SCOOP_OPEN_POSITION_INTERVAL_MINUTES: "10"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: sync and verify receipt head
        run: |
          git config user.name "scoop-agent"
          git config user.email "agent@scoop.local"
          git pull --ff-only origin master
          npm run receipts:verify

      - name: scheduled freshness guard
        id: freshness
        run: node src/should-run-cycle.mjs
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          SCOOP_FORCE_RUN: ${{ env.SCOOP_FORCE_RUN }}

      - name: restore agent wallet keystore
        if: steps.freshness.outputs.should_run == 'true'
        run: |
          mkdir -p ~/.twak && chmod 700 ~/.twak
          echo "${{ secrets.TWAK_WALLET_JSON_B64 }}" | base64 -d > ~/.twak/wallet.json
          chmod 600 ~/.twak/wallet.json

      - name: run cycle
        if: steps.freshness.outputs.should_run == 'true'
        run: |
          if [ "$SCOOP_CLOSE_POSITION" = "1" ]; then
            node src/manual-close-position.mjs
          elif [ "$SCOOP_STABLE_COMPLIANCE" = "1" ]; then
            node src/manual-stable-compliance.mjs
          else
            node src/cycle.mjs
          fi

      - name: verify receipt chain
        if: steps.freshness.outputs.should_run == 'true'
        run: npm run receipts:verify

      - name: guard against stale head
        if: steps.freshness.outputs.should_run == 'true'
        run: |
          git fetch origin master
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/master)" ]; then
            echo "origin/master moved during this cycle; refusing to commit a receipt with a stale prevChecksum"
            exit 1
          fi

      - name: build dashboard feed
        if: steps.freshness.outputs.should_run == 'true'
        run: node src/buildFeed.mjs

      - name: commit receipt
        if: steps.freshness.outputs.should_run == 'true'
        run: |
          git add receipts/ state/ web/public/data/feed.json
          if git diff --staged --quiet; then
            echo "no receipt changes"
          else
            git commit -m "cycle receipt $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi
