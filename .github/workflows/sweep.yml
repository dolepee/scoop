name: Sweep Wallet
on:
  workflow_dispatch:
    inputs:
      to:
        description: "destination address (0x...)"
        required: true
jobs:
  sweep:
    runs-on: ubuntu-latest
    env:
      TWAK_ACCESS_ID: ${{ secrets.TWAK_ACCESS_ID }}
      TWAK_HMAC_SECRET: ${{ secrets.TWAK_HMAC_SECRET }}
      TWAK_WALLET_PASSWORD: ${{ secrets.TWAK_WALLET_PASSWORD }}
      SWEEP_TO: ${{ inputs.to }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - name: restore agent wallet keystore
        run: |
          mkdir -p ~/.twak && chmod 700 ~/.twak
          echo "${{ secrets.TWAK_WALLET_JSON_B64 }}" | base64 -d > ~/.twak/wallet.json
          chmod 600 ~/.twak/wallet.json
      - name: sweep
        run: node scripts/sweep.mjs
