name: Diag Wallet
on:
  workflow_dispatch: {}
jobs:
  diag:
    runs-on: ubuntu-latest
    env:
      TWAK_WALLET_PASSWORD: ${{ secrets.TWAK_WALLET_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - name: restore agent wallet keystore
        run: |
          mkdir -p ~/.twak && chmod 700 ~/.twak
          echo "${{ secrets.TWAK_WALLET_JSON_B64 }}" | base64 -d > ~/.twak/wallet.json
          chmod 600 ~/.twak/wallet.json
      - name: diagnose
        run: node scripts/diag.mjs
